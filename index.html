// ── MSAL CONFIG ───────────────────────────────────────────────
const MSAL_CONFIG = {
  auth: {
    clientId: "82b8f8d4-8ce8-42b3-a21c-21dea545f7cf",
    authority: "https://login.microsoftonline.com/common",
    redirectUri: window.location.origin + window.location.pathname,
  },
  cache: { cacheLocation:"sessionStorage", storeAuthStateInCookie:false }
};
const msalInstance = new Msal.UserAgentApplication(MSAL_CONFIG);
const SCOPES = ["User.Read","Sites.ReadWrite.All","Files.ReadWrite.All"];

async function getToken() {
  try {
    // Always try silent first - this refreshes if expired
    const result = await msalInstance.acquireTokenSilent({ scopes:SCOPES });
    return result.accessToken;
  } catch(ex) {
    // Silent failed (expired or no session), try popup
    try {
      const result = await msalInstance.acquireTokenPopup({ scopes:SCOPES });
      return result.accessToken;
    } catch(ex2) {
      throw new Error("No hay sesión activa. Por favor iniciá sesión nuevamente.");
    }
  }
}

// ── FIELD CONFIG ──────────────────────────────────────────────
const TIPO_OPTS = ["Caldereria / Soldadura","Mecanica","Eléctrico","Tareas auxiliares","Torneria","Ingeniería"];
// Normalize tipo: unify old names
function normTipo(v) {
  if (!v) return v;
  if (v==="Caldereria"||v==="Soldadura") return "Caldereria / Soldadura";
  if (v==="Limpieza / terminaciones"||v==="terminacion int/ext"||v==="Terminacion int/ext"||v==="Limpieza"||v==="Terminaciones") return "Tareas auxiliares";
  return v;
}

const FIELDS = {
  titulo:      { name:"Title",                    type:"text" },
  buque:       { name:"Buque",                    type:"choice_single",  opts:["Oreste","Secondina","Flecha","Bucanero","Libertador"] },
  categoria:   { name:"Categoria",                type:"choice_multi",   opts:["Mantenimiento","Prefectura"] },
  tipo:        { name:"Tipodetarea",              type:"choice_multi",   opts:TIPO_OPTS },
  seccion:     { name:"Secci_x00f3_ndelbuque",    type:"text" },
  responsable: { name:"Responsable",              type:"choice_multi",   opts:["Astillero","Jefatura / Direccion","Tercerizado"] },
  estado:      { name:"Estado",                   type:"choice_multi",   opts:["Pendiente","En curso","Finalizado","En curso con retraso","En programación semanal","A espera de insumos"] },
  duracion:    { name:"Duraciondelatarea",         type:"number" },
  insumos:     { name:"Insumosrequeridos",         type:"textarea" },
  monto:       { name:"Montodeinsumos",            type:"currency" },
  inicio:      { name:"Iniciodetarea",             type:"date" },

};

const fn = k => FIELDS[k].name;
const arr = v => Array.isArray(v) ? v : (v ? [v] : []);
const arrStr = v => arr(v).join(", ");
const arrFirst = v => { const a=arr(v)[0]||""; return normTipo(a); };

const LIST_ID = "5c0d1a94-a41e-415a-9d49-c86f19b42f6e";
const SITE = "grupozand.sharepoint.com";
const SITE_ID = "grupozand.sharepoint.com,030f5a29-60ed-4a36-8682-7faea5f1559e,7c4b21f1-e10d-49ba-8a22-908bda8d8b01";
const BASE = "/sites/"+SITE_ID+"/lists/"+LIST_ID;

async function gGet(tok, url) {
  const r = await fetch("https://graph.microsoft.com/v1.0"+url, { headers:{ Authorization:"Bearer "+tok } });
  if (!r.ok) throw new Error("Error "+r.status+": "+(await r.text()).substring(0,400));
  return r.json();
}
async function gPatch(tok, url, body) {
  // Try with current token, if 401 refresh and retry once
  let t = tok;
  let r = await fetch("https://graph.microsoft.com/v1.0"+url, { method:"PATCH", headers:{ Authorization:"Bearer "+t, "Content-Type":"application/json" }, body:JSON.stringify(body) });
  if (r.status === 401) {
    t = await getToken();
    r = await fetch("https://graph.microsoft.com/v1.0"+url, { method:"PATCH", headers:{ Authorization:"Bearer "+t, "Content-Type":"application/json" }, body:JSON.stringify(body) });
  }
  if (!r.ok) throw new Error("Error "+r.status+": "+(await r.text()).substring(0,400));
  return r.json();
}
async function gPost(tok, url, body) {
  let t = tok;
  let r = await fetch("https://graph.microsoft.com/v1.0"+url, { method:"POST", headers:{ Authorization:"Bearer "+t, "Content-Type":"application/json" }, body:JSON.stringify(body) });
  if (r.status === 401) {
    t = await getToken();
    r = await fetch("https://graph.microsoft.com/v1.0"+url, { method:"POST", headers:{ Authorization:"Bearer "+t, "Content-Type":"application/json" }, body:JSON.stringify(body) });
  }
  if (!r.ok) throw new Error("Error "+r.status+": "+(await r.text()).substring(0,400));
  return r.json();
}
async function gDelete(tok, url) {
  let t = tok;
  let r = await fetch("https://graph.microsoft.com/v1.0"+url, { method:"DELETE", headers:{ Authorization:"Bearer "+t } });
  if (r.status === 401) {
    t = await getToken();
    r = await fetch("https://graph.microsoft.com/v1.0"+url, { method:"DELETE", headers:{ Authorization:"Bearer "+t } });
  }
  if (!r.ok) throw new Error("Error "+r.status);
}
async function getItems(tok) {
  let items=[], url=BASE+"/items?$expand=fields&$top=200";
  while(url) {
    const d = await gGet(tok, url);
    items = items.concat(d.value||[]);
    url = d["@odata.nextLink"] ? d["@odata.nextLink"].replace("https://graph.microsoft.com/v1.0","") : null;
  }
  return items.map(i=>({ _id:i.id, _webUrl:i.webUrl, ...i.fields }));
}

function buildSaveFields(form) {
  const out = {};
  if (form.Title) out.Title = form.Title;
  if (form["Secci_x00f3_ndelbuque"]) out["Secci_x00f3_ndelbuque"] = form["Secci_x00f3_ndelbuque"];
  if (form.Insumosrequeridos) out.Insumosrequeridos = form.Insumosrequeridos;
  if (form.Comentariosgenerales) out.Comentariosgenerales = form.Comentariosgenerales;
  if (form.Buque) out.Buque = form.Buque;
  if (form.Categoria) { out["Categoria@odata.type"] = "Collection(Edm.String)"; out.Categoria = [form.Categoria]; }
  if (form.Tipodetarea) { out["Tipodetarea@odata.type"] = "Collection(Edm.String)"; out.Tipodetarea = [form.Tipodetarea]; }
  if (form.Responsable) { out["Responsable@odata.type"] = "Collection(Edm.String)"; out.Responsable = [form.Responsable]; }
  if (form.Estado) { out["Estado@odata.type"] = "Collection(Edm.String)"; out.Estado = [form.Estado]; }
  const dur = parseFloat(form.Duraciondelatarea);
  if (!isNaN(dur) && form.Duraciondelatarea !== "") out.Duraciondelatarea = dur;
  const monto = parseFloat(form.Montodeinsumos);
  if (!isNaN(monto) && form.Montodeinsumos !== "") out.Montodeinsumos = monto;
  const durR = parseFloat(form["Duraci_x00f3_nreal"]);
  if (!isNaN(durR) && form["Duraci_x00f3_nreal"] !== "") out["Duraci_x00f3_nreal"] = durR;
  if (form.Iniciodetarea) out.Iniciodetarea = form.Iniciodetarea+"T12:00:00Z";
  if (form.Findetarea) out.Findetarea = form.Findetarea+"T12:00:00Z";
  return out;
}

const parseMonto = v => { const n=parseFloat((v||"0").toString().replace(/[^0-9.]/g,"")); return isNaN(n)?0:n; };
const fmt = n => { if(!n||n===0)return"$0"; return n>=1e6?"$"+(n/1e6).toFixed(1)+"M":n>=1000?"$"+(n/1000).toFixed(0)+"K":"$"+Math.round(n); };
const fmtDate = v => v ? new Date(v).toLocaleDateString("es-AR") : "—";
const getEstado = i => arrFirst(i[fn("estado")]);
const statColor = {"Pendiente":C.dim,"En curso":C.steel,"Finalizado":C.success,"En curso con retraso":C.warning,"En programación semanal":"#9b59b6","A espera de insumos":"#e67e22"};
const statBg = {"Pendiente":"#2a2a35","En curso":"#1a2f45","Finalizado":"#1a3520","En curso con retraso":"#3a2a10","En programación semanal":"#2a1a3a","A espera de insumos":"#3a2010"};
const tipoColor = {"Caldereria / Soldadura":"#c0392b","Mecanica":"#e8a020","Eléctrico":"#4a7fa5","Tareas auxiliares":"#27ae60","Torneria":"#9b59b6","Ingeniería":"#16a085"};

// ── LOGIN SCREEN ─────────────────────────────────────────────
function LoginScreen({ onLogin, error }) {
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState(error||"");

  async function login() {
    setLoading(true); setErr("");
    try {
      await msalInstance.loginPopup({ scopes:SCOPES });
      const tok = await getToken();
      onLogin(tok);
    } catch(ex) {
      setErr(ex.message||"Error al iniciar sesión");
      setLoading(false);
    }
  }

  return e("div",{style:{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center"}},
    e("div",{style:{width:480,padding:48,background:C.surface,border:"1px solid "+C.border,borderRadius:16,textAlign:"center"}},
      e("div",{style:{marginBottom:32,display:"flex",justifyContent:"center"}},e(BVLogo)),
      e("div",{style:{fontSize:13,color:C.dim,marginTop:12,marginBottom:40}},"Sistema de Gestión de Proyectos Navales — Grupo Zand"),
      e("button",{onClick:login,disabled:loading,style:{
        width:"100%",padding:"14px 20px",
        background:loading?"#a06a10":C.accent,
        color:"#000",fontWeight:800,fontSize:15,
        border:"none",borderRadius:8,cursor:loading?"not-allowed":"pointer",
        display:"flex",alignItems:"center",justifyContent:"center",gap:12
      }},
        e("svg",{width:20,height:20,viewBox:"0 0 21 21",fill:"none",xmlns:"http://www.w3.org/2000/svg"},
          e("rect",{x:1,y:1,width:9,height:9,fill:"#f25022"}),
          e("rect",{x:11,y:1,width:9,height:9,fill:"#7fba00"}),
          e("rect",{x:1,y:11,width:9,height:9,fill:"#00a4ef"}),
          e("rect",{x:11,y:11,width:9,height:9,fill:"#ffb900"})
        ),
        loading?"Iniciando sesión...":"Iniciar sesión con Microsoft"
      ),
      err&&e("div",{style:{color:C.danger,fontSize:12,marginTop:16,padding:10,background:"#2a1010",borderRadius:6,textAlign:"left",lineHeight:"1.6"}},err),
      e("div",{style:{marginTop:24,fontSize:11,color:C.dim}},"Usá tu cuenta @grupozand.com o la cuenta autorizada por Grupo Zand")
    )
  );
}

// ── PRINT TASK ────────────────────────────────────────────────
async function printTask(task, photos, tok) {
  const buque = task[fn("buque")]||"";
  const tipo = arrFirst(task[fn("tipo")])||"";
  const estado = getEstado(task);
  const seccion = task[fn("seccion")]||"—";
  const duracion = task[fn("duracion")]||"—";
  const inicio = task[fn("inicio")] ? new Date(task[fn("inicio")]).toLocaleDateString("es-AR") : "—";
  const fin = task[fn("fin")] ? new Date(task[fn("fin")]).toLocaleDateString("es-AR") : "—";
  const insumos = task[fn("insumos")]||"—";
  const comentarios = task[fn("comentarios")]||"—";
  const col = tipoColor[tipo]||"#4a7fa5";
  const bCol = buqueColor[buque]||"#4a7fa5";

  // Fetch images as base64 so they render without auth headers
  const photoData = await Promise.all(photos.map(async p => {
    try {
      const r = await fetch("https://graph.microsoft.com/v1.0/me/drive/items/"+p.id+"/content", {
        headers:{ Authorization:"Bearer "+tok }
      });
      if (!r.ok) return null;
      const blob = await r.blob();
      return new Promise(res => {
        const reader = new FileReader();
        reader.onloadend = () => res({ name: p.name, src: reader.result });
        reader.readAsDataURL(blob);
      });
    } catch(ex) { return null; }
  }));
  const validPhotos = photoData.filter(Boolean);

  const photoImgTags = validPhotos.map(p=>`
    <div style="break-inside:avoid;margin-bottom:12px;">
      <img src="${p.src}" style="max-width:100%;max-height:260px;object-fit:contain;border-radius:6px;border:1px solid #ddd;display:block;"/>
      <div style="font-size:10px;color:#888;margin-top:4px;">${p.name.replace(/^\d+_/,"")}</div>
    </div>`).join("");

  const win = window.open("","_blank","width=800,height=900");
  win.document.write(`<!DOCTYPE html><html><head>
  <meta charset="UTF-8">
  <title>Tarea — ${task.Title}</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #fff; color: #1a1a2e; }
    .header { background: #000; color: #fff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .logo { font-size: 20px; font-weight: 900; letter-spacing: -1px; }
    .logo-sub { font-size: 8px; letter-spacing: 3px; opacity: 0.7; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
    .title { font-size: 22px; font-weight: 900; margin-bottom: 6px; border-left: 4px solid ${col}; padding-left: 12px; }
    .barco-tag { display: inline-block; background: ${bCol}22; color: ${bCol}; border: 1px solid ${bCol}; border-radius: 4px; padding: 2px 10px; font-size: 12px; font-weight: 700; margin-bottom: 16px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .field { background: #f8f9fa; border-radius: 6px; padding: 10px 14px; }
    .field-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 3px; }
    .field-value { font-size: 14px; font-weight: 600; color: #1a1a2e; }
    .section { margin-bottom: 16px; }
    .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 4px; }
    .text-block { background: #f8f9fa; border-radius: 6px; padding: 12px 14px; font-size: 13px; white-space: pre-wrap; line-height: 1.6; }
    .photos { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .footer { margin-top: 20px; padding-top: 12px; border-top: 1px solid #eee; font-size: 10px; color: #aaa; display: flex; justify-content: space-between; }
    @media print { body { margin: 0; } @page { margin: 15mm; } }
  </style>
  </head><body>
  <div class="header">
    <div>
      <div class="logo">Bloom Voss Unit</div>
      <div class="logo-sub">Construcciones y Reparaciones Navales</div>
    </div>
    <div style="text-align:right;font-size:11px;opacity:0.8;">Grupo Zand<br>${new Date().toLocaleDateString("es-AR")}</div>
  </div>

  <div class="title">${task.Title}</div>
  <div class="barco-tag">🚢 ${buque}</div>
  <div style="margin-bottom:16px;">
    <span class="badge" style="background:${col}22;color:${col};border:1px solid ${col};">${tipo}</span>
    &nbsp;
    <span class="badge" style="background:#f0f0f0;color:#555;border:1px solid #ccc;">${estado}</span>
  </div>

  <div class="grid">
    <div class="field"><div class="field-label">Sección del buque</div><div class="field-value">${seccion}</div></div>
    <div class="field"><div class="field-label">Duración estimada</div><div class="field-value">${duracion} días</div></div>
    <div class="field"><div class="field-label">Fecha de inicio</div><div class="field-value">${inicio}</div></div>
    <div class="field"><div class="field-label">Fecha de fin</div><div class="field-value">${fin}</div></div>
  </div>

  ${insumos!=="—"?`<div class="section"><div class="section-title">Insumos requeridos</div><div class="text-block">${insumos}</div></div>`:""}
  ${comentarios!=="—"?`<div class="section"><div class="section-title">Comentarios generales</div><div class="text-block">${comentarios}</div></div>`:""}

  ${validPhotos.length>0?`<div class="section"><div class="section-title">Fotos de la tarea (${validPhotos.length})</div><div class="photos">${photoImgTags}</div></div>`:""}

  <div class="footer">
    <span>Bloom Voss Unit — Grupo Zand</span>
    <span>ID: ${task.ID||task._id} — Impreso: ${new Date().toLocaleString("es-AR")}</span>
  </div>
  <sc`+"ript>setTimeout(()=>{ window.print(); }, 400);</sc"+"ript></body></html>");
  win.document.close();
}

// ── TASK MODAL ────────────────────────────────────────────────
function TaskModal({ task, onClose, onSave, onDelete, isNew, tok }) {
  const init = task ? {
    _id:task._id, Title:task.Title||"", Buque:task[fn("buque")]||"",
    Categoria:arrFirst(task[fn("categoria")]), Tipodetarea:arrFirst(task[fn("tipo")]),
    "Secci_x00f3_ndelbuque":task[fn("seccion")]||"", Responsable:arrFirst(task[fn("responsable")]),
    Estado:arrFirst(task[fn("estado")])||"Pendiente", Duraciondelatarea:task[fn("duracion")]||"",
    Insumosrequeridos:task[fn("insumos")]||"", Montodeinsumos:task[fn("monto")]||"",
    Iniciodetarea:task[fn("inicio")]?task[fn("inicio")].substring(0,10):"",
    Findetarea:task[fn("fin")]?task[fn("fin")].substring(0,10):"",
    "Duraci_x00f3_nreal":task[fn("durReal")]||"", Comentariosgenerales:task[fn("comentarios")]||"",
  } : {Title:"",Buque:"",Categoria:"",Tipodetarea:"","Secci_x00f3_ndelbuque":"",Responsable:"",Estado:"Pendiente",Duraciondelatarea:"",Insumosrequeridos:"",Montodeinsumos:"",Iniciodetarea:"",Findetarea:"","Duraci_x00f3_nreal":"",Comentariosgenerales:""};

  const [form, setForm] = useState(init);
  const [saving, setSaving] = useState(false);
  const [delConfirm, setDelConfirm] = useState(false);
  const [photos, setPhotos] = useState([]);
  const [loadingPhotos, setLoadingPhotos] = useState(false);
  const [uploading, setUploading] = useState(false);
  const [lightbox, setLightbox] = useState(null);
  const fileRef = useRef();

  useEffect(()=>{ if(task&&!isNew) loadPhotos(); },[]);

  async function loadPhotos() {
    const buque = task[fn("buque")];
    const itemId = task.ID || task.id;
    if (!buque||!itemId) return;
    setLoadingPhotos(true);
    try {
      const d = await gGet(tok, "/me/drive/root:/Fotos_Astillero/"+encodeURIComponent(buque)+":/children?$select=name,id,webUrl&$top=200");
      const prefix = String(itemId)+"_";
      setPhotos((d.value||[]).filter(f=>f.name.startsWith(prefix)));
    } catch(ex){ console.log("Fotos:", ex.message); }
    finally { setLoadingPhotos(false); }
  }

  async function handleUpload(ev) {
    const files = ev.target.files;
    if (!files||files.length===0) return;
    const buque = form.Buque||(task&&task[fn("buque")]);
    const itemId = task&&(task.ID||task.id);
    if (!buque||!itemId) { alert("La tarea debe tener un barco asignado."); return; }
    setUploading(true);
    try {
      for (const file of files) {
        const newName = itemId+"_"+file.name;
        const r = await fetch("https://graph.microsoft.com/v1.0/me/drive/root:/Fotos_Astillero/"+encodeURIComponent(buque)+"/"+encodeURIComponent(newName)+":/content", {
          method:"PUT", headers:{ Authorization:"Bearer "+tok, "Content-Type":file.type||"image/jpeg" }, body:file
        });
        if (!r.ok) throw new Error("Error: "+(await r.text()).substring(0,200));
      }
      await loadPhotos();
    } catch(ex){ alert("Error al subir: "+ex.message); }
    finally { setUploading(false); ev.target.value=""; }
  }

  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const st = {width:"100%",background:C.bg,border:"1px solid "+C.border,borderRadius:6,color:C.text,padding:"8px 10px",fontSize:13,outline:"none"};

  const formFields = [
    {k:"Title",l:"Título",t:"text",req:true,wide:true},
    {k:"Buque",l:"Buque",t:"sel",o:FIELDS.buque.opts},
    {k:"Categoria",l:"Categoría",t:"sel",o:FIELDS.categoria.opts},

// ── GANTT ─────────────────────────────────────────────────────
function GanttBar({ task, wStart, wEnd, tok, onUpdate, saving }) {
  const rowRef = useRef(null);
  const dragRef = useRef(null);

  const MS_PER_DAY = 86400000;

  function getBarData() {
    const tot = wEnd - wStart;
    const s = task[fn("inicio")] ? new Date(task[fn("inicio")]) : null;
    if (!s) return null;
    const sDay = new Date(s); sDay.setHours(0,0,0,0);
    const dur = task[fn("duracion")] ? parseInt(task[fn("duracion")]) : 1;
    const finField = task[fn("fin")] ? new Date(task[fn("fin")]) : null;
    const en = finField || new Date(sDay.getTime() + (dur - 1) * MS_PER_DAY);
    const eDay = new Date(en); eDay.setHours(23,59,59,999);
    const left = Math.max(0, (sDay - wStart) / tot * 100);
    const right = Math.min(100, (eDay - wStart) / tot * 100);
    return { left, width: Math.max(1, right - left), sDay, eDay, dur };
  }

  function pxToDay(pxOffset, containerWidth) {
    const totalMs = wEnd - wStart;
    const ms = (pxOffset / containerWidth) * totalMs;
    return Math.round(ms / MS_PER_DAY);
  }

  function startDrag(ev, mode) {
    ev.preventDefault();
    ev.stopPropagation();
    const container = rowRef.current;
    if (!container) return;
    const rect = container.getBoundingClientRect();
    const startX = ev.clientX;
    const barData = getBarData();
    if (!barData) return;

    dragRef.current = { mode, startX, rect, barData };

    function onMove(mv) {
      if (!dragRef.current) return;
      const { mode, startX, rect, barData } = dragRef.current;
      const dx = mv.clientX - startX;
      const daysDelta = Math.round((dx / rect.width) * 7);

      let newStart = new Date(barData.sDay);
      let newDur = barData.dur;

      if (mode === "move") {
        newStart = new Date(barData.sDay.getTime() + daysDelta * MS_PER_DAY);
      } else if (mode === "resize") {
        newDur = Math.max(1, barData.dur + daysDelta);
      }

      // Visual feedback only - actual save on mouseup
      const el = container.querySelector(".gantt-bar");
      if (el) {
        const tot = wEnd - wStart;
        const sDay = new Date(newStart); sDay.setHours(0,0,0,0);
        const eDay = new Date(sDay.getTime() + newDur * MS_PER_DAY); eDay.setHours(23,59,59,999);
        const left = Math.max(0, (sDay - wStart) / tot * 100);
        const right = Math.min(100, (eDay - wStart) / tot * 100);
        el.style.left = left + "%";
        el.style.width = Math.max(1, right - left) + "%";
      }
      dragRef.current.newStart = newStart;
      dragRef.current.newDur = newDur;
    }

    async function onUp() {
      document.removeEventListener("mousemove", onMove);
      document.removeEventListener("mouseup", onUp);
      if (!dragRef.current) return;
      const { newStart, newDur, mode } = dragRef.current;
      if (newStart || newDur) {
        const fields = {};
        if (mode === "move" && newStart) {
          const d = new Date(newStart); d.setHours(12,0,0,0);
          fields.Iniciodetarea = d.toISOString();
        }
        if (mode === "resize" && newDur !== undefined) {
          fields.Duraciondelatarea = newDur;
          // Also clear fin date so duration drives the end
          fields.Findetarea = null;
        }
        await onUpdate(task._id, fields);
      }
      dragRef.current = null;
    }

    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
  }

  const barData = getBarData();
  const col = tipoColor[arrFirst(task[fn("tipo")])] || C.steel;
  if (!barData) return e("div", {ref: rowRef, style:{position:"relative",height:32,background:C.border+"44",borderRadius:4}});

  return e("div", {
    ref: rowRef,
    style: {position:"relative", height:32, background:C.border+"44", borderRadius:4, userSelect:"none"}
  },
    ...[1,2,3,4,5,6].map(i => e("div",{key:i,style:{position:"absolute",left:(i/7*100)+"%",top:0,bottom:0,width:1,background:C.border}})),
    e("div", {
      className: "gantt-bar",
      style: {
        position:"absolute", left:barData.left+"%", width:barData.width+"%",
        top:3, bottom:3,
        background: col+"cc", borderRadius:4, border:"1px solid "+col,
        display:"flex", alignItems:"center", overflow:"hidden",
        cursor: saving ? "wait" : "grab",
        transition: dragRef.current ? "none" : "left 0.2s, width 0.2s"
      },
      onMouseDown: (ev) => startDrag(ev, "move")
    },
      e("span",{style:{fontSize:10,color:"#fff",fontWeight:700,whiteSpace:"nowrap",paddingLeft:6,flex:1,overflow:"hidden",textOverflow:"ellipsis"}},
        arrFirst(task[fn("tipo")])||"", " · ", barData.dur+"d"
      ),
      // Resize handle
      e("div",{
        style:{width:8,height:"100%",cursor:"ew-resize",background:"rgba(0,0,0,0.2)",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"},
        onMouseDown:(ev)=>{ ev.stopPropagation(); startDrag(ev,"resize"); }
      }, e("div",{style:{width:2,height:12,background:"rgba(255,255,255,0.7)",borderRadius:1}}))
    )
  );
}

function GanttView({ tasks, tok, onUpdateTask }) {
  const [off, setOff] = useState(0);
  const [saving, setSaving] = useState(null);
  const [toast, setToast] = useState("");

  const wStart = useMemo(()=>{ const d=new Date(); d.setDate(d.getDate()-d.getDay()+1+off*7); d.setHours(0,0,0,0); return d; },[off]);
  const days = Array.from({length:7},(_,i)=>{ const d=new Date(wStart); d.setDate(d.getDate()+i); return d; });
  const wEnd = new Date(days[6]); wEnd.setHours(23,59,59);
  const dnames = ["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];
  const wLabel = days[0].getDate()+"/"+(days[0].getMonth()+1)+" — "+days[6].getDate()+"/"+(days[6].getMonth()+1)+"/"+days[6].getFullYear();

  const visible = tasks.filter(t=>{
    const s = t[fn("inicio")] ? new Date(t[fn("inicio")]) : null;
    if (!s) return false;
    const dur = t[fn("duracion")] ? parseInt(t[fn("duracion")]) : 0;
    const en = t[fn("fin")] ? new Date(t[fn("fin")]) : (dur>0 ? new Date(s.getTime()+dur*86400000) : s);
    return s<=wEnd && en>=wStart;
  });

  const groups = {};
  visible.forEach(t=>{ const b=t[fn("buque")]||"Sin barco"; if(!groups[b])groups[b]=[]; groups[b].push(t); });

  async function handleUpdate(itemId, fields) {
    setSaving(itemId);
    try {
      await onUpdateTask(itemId, fields);
      setToast("✓ Guardado");
      setTimeout(()=>setToast(""),2000);
    } catch(ex) {
      setToast("Error: "+ex.message);
      setTimeout(()=>setToast(""),3000);
    }
    setSaving(null);
  }

  return e("div",null,
    e("div",{style:{display:"flex",alignItems:"center",gap:12,marginBottom:20}},
      e("button",{onClick:()=>setOff(o=>o-1),style:{background:C.surface,border:"1px solid "+C.border,color:C.text,padding:"6px 14px",borderRadius:6,cursor:"pointer",fontWeight:500}},"← Anterior"),
      e("div",{style:{flex:1,textAlign:"center",fontWeight:700,color:C.text,fontSize:15}},"Semana del "+wLabel),
      toast&&e("span",{style:{fontSize:12,color:toast.startsWith("Error")?C.danger:C.success,fontWeight:700}},toast),
      e("button",{onClick:()=>setOff(0),style:{background:C.accent,border:"none",color:"#000",padding:"6px 14px",borderRadius:6,cursor:"pointer",fontWeight:700}},"Hoy"),
      e("button",{onClick:()=>setOff(o=>o+1),style:{background:C.surface,border:"1px solid "+C.border,color:C.text,padding:"6px 14px",borderRadius:6,cursor:"pointer",fontWeight:500}},"Siguiente →")
    ),
    e("div",{style:{fontSize:11,color:C.dim,marginBottom:8,padding:"6px 10px",background:C.surfaceHigh,borderRadius:6,border:"1px solid "+C.border}},
      "💡 Arrastrá la barra para mover la fecha de inicio · Arrastrá el borde derecho ",e("strong",null,"▐")," para cambiar la duración"
    ),
    // Header days
    e("div",{style:{display:"grid",gridTemplateColumns:"260px 1fr",marginBottom:4,borderBottom:"2px solid "+C.border,paddingBottom:4}},
      e("div",{style:{fontSize:11,fontWeight:700,color:C.dim,textTransform:"uppercase",letterSpacing:"0.06em"}},"Tarea"),
      e("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)"}},
        ...days.map((d,i)=>{
          const today=d.toDateString()===new Date().toDateString();
          return e("div",{key:i,style:{textAlign:"center",fontSize:11,fontWeight:700,color:today?C.accent:C.dim,padding:"2px 0",background:today?C.accent+"18":"transparent",borderRadius:3}},
            dnames[i],e("br"),e("span",{style:{fontSize:13,fontWeight:700,color:today?C.accent:C.text}},d.getDate())
          );
        })
      )
    ),
    Object.keys(groups).length===0
      ? e("div",{style:{padding:40,textAlign:"center",color:C.dim}},
          "No hay tareas con fecha de inicio para esta semana.",
          e("br"),e("span",{style:{fontSize:12}},"Editá las tareas y completá la fecha de Inicio.")
        )
      : Object.entries(groups).map(([buque,list])=>e("div",{key:buque,style:{marginBottom:20}},
          e("div",{style:{
            fontSize:11,fontWeight:800,color:buqueColor[buque]||C.accent,
            textTransform:"uppercase",letterSpacing:"0.1em",
            marginBottom:6,padding:"4px 8px",
            borderLeft:"3px solid "+(buqueColor[buque]||C.accent),
            background:(buqueColor[buque]||C.accent)+"12",borderRadius:"0 4px 4px 0"
          }},buque),
          ...list.map(t=>e("div",{key:t._id,style:{display:"grid",gridTemplateColumns:"260px 1fr",alignItems:"center",marginBottom:4,minHeight:38}},
            e("div",{style:{fontSize:12,color:C.text,paddingRight:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",lineHeight:"1.3"},title:t.Title},
              t.Title,
              t[fn("duracion")]&&e("span",{style:{fontSize:10,color:C.dim,marginLeft:5,background:C.surfaceHigh,border:"1px solid "+C.border,padding:"1px 5px",borderRadius:3}},t[fn("duracion")]+"d")
            ),
            e(GanttBar,{task:t,wStart,wEnd,tok,onUpdate:handleUpdate,saving:saving===t._id})
          ))
        )),
    e("div",{style:{marginTop:20,display:"flex",gap:14,flexWrap:"wrap",paddingTop:12,borderTop:"1px solid "+C.border}},
      e("span",{style:{fontSize:11,color:C.dim,fontWeight:700,marginRight:4}},"Tipos:"),

function App() {
  const [tok, setTok] = useState("");
  const [userName, setUserName] = useState("");
  const [loginError, setLoginError] = useState("");
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");
  const [tab, setTab] = useState("dash");
  // Global filters (shared across tabs)
  const [fBuque, setFBuque] = useState("Todos");
  const [fEstado, setFEstado] = useState("Todos");
  const [fTipo, setFTipo] = useState("Todos");
  const [fSeccion, setFSeccion] = useState("Todos");
  const [q, setQ] = useState("");
  const [editT, setEditT] = useState(null);
  const [newT, setNewT] = useState(false);
  const [ok, setOk] = useState("");

  useEffect(()=>{
    const account = msalInstance.getAccount();
    if (account) {
      setUserName(account.name||account.userName||"");
      getToken().then(t=>{ setTok(t); fullConnect(t); }).catch(ex=>setLoginError(ex.message));
    }
  },[]);

  function handleLogin(t) {
    const account = msalInstance.getAccount();
    if (account) setUserName(account.name||account.userName||"");
    setTok(t);
    fullConnect(t);
  }

  async function refreshToken() {
    try { const t = await getToken(); setTok(t); return t; }
    catch(ex) { setLoginError(ex.message); return tok; }
  }

  async function fullConnect(t) { setLoading(true); setErr(""); try{ setItems(await getItems(t)); }catch(ex){ setErr(ex.message); }finally{setLoading(false);} }
  async function connect(t) { setTok(t); await fullConnect(t); }
  async function logout() {
    msalInstance.logout();
    setTok(""); setItems([]); setUserName("");
  }
  function flash(m){ setOk(m); setTimeout(()=>setOk(""),3000); }
  async function refresh(){ setLoading(true); try{setItems(await getItems(tok));}catch(ex){setErr(ex.message);}finally{setLoading(false);} }

  async function saveTask(itemId, fields) {
    try {
      if(itemId) { await gPatch(tok,BASE+"/items/"+itemId+"/fields",fields); }
      else {
        const created = await gPost(tok,BASE+"/items",{ fields:{ Title: fields.Title||"Nueva tarea" } });
        const { Title, ...rest } = fields;
        if(Object.keys(rest).length>0) await gPatch(tok,BASE+"/items/"+created.id+"/fields", rest);
      }
      await refresh();
      flash(itemId?"✓ Tarea actualizada":"✓ Tarea creada");
      setEditT(null); setNewT(false);
    } catch(ex) { throw ex; }
  }

  async function deleteTask(itemId) {
    try {
      await gDelete(tok, BASE+"/items/"+itemId);
      setItems(p=>p.filter(i=>i._id!==itemId));
      flash("✓ Tarea eliminada");
      setEditT(null);
    } catch(ex){ alert("Error al eliminar: "+ex.message); }
  }

  async function quickStatus(item, status) {
    try {
      await gPatch(tok,BASE+"/items/"+item._id+"/fields",{ "Estado@odata.type":"Collection(Edm.String)", Estado:[status] });
      setItems(p=>p.map(i=>i._id===item._id?{...i,[fn("estado")]:[status]}:i));
      flash("✓ "+status);
    } catch(ex){ alert(ex.message); }
  }

  async function refresh(){ setLoading(true); try{ const t=await refreshToken(); setItems(await getItems(t)); }catch(ex){setErr(ex.message);}finally{setLoading(false);} }

  if(!tok) return e(LoginScreen,{onLogin:handleLogin,error:loginError});
  if(loading&&items.length===0) return e("div",{style:{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center"}},
    e("div",{style:{textAlign:"center"}},
      e("div",{style:{marginBottom:16,display:"flex",justifyContent:"center"}},e(BVLogo)),
      e("div",{style:{fontSize:14,color:C.dim,marginBottom:16,marginTop:8}},"Cargando datos de SharePoint..."),
      err&&e("div",{style:{color:C.danger,maxWidth:500,padding:16,background:"#2a1010",borderRadius:8,fontSize:13,lineHeight:"1.6"}},err,e("br"),e("br"),e("button",{onClick:()=>{setTok("");setItems([]);},style:{padding:"8px 16px",background:C.accent,border:"none",borderRadius:4,cursor:"pointer",fontWeight:700,color:"#000"}},"Volver al login"))
    )
  );

  // ── Derived data ──
  const buques=["Todos",...new Set(items.map(i=>i[fn("buque")]).filter(Boolean))];
  const tipos=["Todos",...new Set(items.flatMap(i=>arr(i[fn("tipo")]).map(normTipo)).filter(Boolean))];
  const secciones=["Todos",...new Set(items.map(i=>i[fn("seccion")]).filter(Boolean))];

  const filtered=items.filter(i=>{
    if(fBuque!=="Todos"&&i[fn("buque")]!==fBuque)return false;
    if(fEstado!=="Todos"&&getEstado(i)!==fEstado)return false;
    if(fTipo!=="Todos"&&!arr(i[fn("tipo")]).map(normTipo).includes(fTipo))return false;
    if(fSeccion!=="Todos"&&i[fn("seccion")]!==fSeccion)return false;
    if(q&&!JSON.stringify(i).toLowerCase().includes(q.toLowerCase()))return false;
    return true;
  });

  // Dashboard uses fBuque filter only
  const dashItems = fBuque==="Todos" ? items : items.filter(i=>i[fn("buque")]===fBuque);

  const total=dashItems.length;
  const nFin=dashItems.filter(i=>getEstado(i)==="Finalizado").length;
  const nEnc=dashItems.filter(i=>["En curso","En curso con retraso"].includes(getEstado(i))).length;
  const nPen=dashItems.filter(i=>getEstado(i)==="Pendiente").length;
  const pct=total>0?Math.round(nFin/total*100):0;
  const montoTot=dashItems.reduce((s,i)=>s+parseMonto(i[fn("monto")]),0);
  const montoPend=dashItems.filter(i=>getEstado(i)!=="Finalizado").reduce((s,i)=>s+parseMonto(i[fn("monto")]),0);

  const byBuque=buques.filter(b=>b!=="Todos").map(b=>{
    const t=items.filter(i=>i[fn("buque")]===b);
    const f=t.filter(i=>getEstado(i)==="Finalizado").length;
    const m=t.reduce((s,i)=>s+parseMonto(i[fn("monto")]),0);
    const mPend=t.filter(i=>getEstado(i)!=="Finalizado").reduce((s,i)=>s+parseMonto(i[fn("monto")]),0);
    return{b,t:t.length,f,p:t.length>0?Math.round(f/t.length*100):0,m,mPend,mEjec:m-mPend};
  });

  // Distribución por tipo: count of tasks
  const byTipoCnt={};
  dashItems.forEach(i=>arr(i[fn("tipo")]).map(normTipo).forEach(k=>{ byTipoCnt[k]=(byTipoCnt[k]||0)+1; }));

  // Distribución por tipo: días estimados pendientes (rounded)
  const byTipoDias={};
  dashItems.filter(i=>getEstado(i)==="Pendiente"||getEstado(i)==="En curso"||getEstado(i)==="En curso con retraso").forEach(i=>{
    const dur=Math.round(parseFloat(i[fn("duracion")])||0);
    arr(i[fn("tipo")]).map(normTipo).forEach(k=>{ byTipoDias[k]=(byTipoDias[k]||0)+dur; });
  });
  const maxDias = Math.max(...Object.values(byTipoDias),1);

  // Distribución por tipo: cantidad de tareas pendientes
  const byTipoPendCnt={};
  dashItems.filter(i=>getEstado(i)==="Pendiente"||getEstado(i)==="En curso"||getEstado(i)==="En curso con retraso").forEach(i=>{
    arr(i[fn("tipo")]).map(normTipo).forEach(k=>{ byTipoPendCnt[k]=(byTipoPendCnt[k]||0)+1; });
  });
  const maxPendCnt = Math.max(...Object.values(byTipoPendCnt),1);

  // Insumos week/fortnight (based on Iniciodetarea)
  const now = new Date(); now.setHours(0,0,0,0);
  const week2 = new Date(now.getTime()+14*86400000);
  const week1 = new Date(now.getTime()+7*86400000);

  const montoSemana = dashItems.filter(i=>{
    const s = i[fn("inicio")] ? new Date(i[fn("inicio")]) : null;
    return s && s>=now && s<=week1 && getEstado(i)!=="Finalizado";
  }).reduce((s,i)=>s+parseMonto(i[fn("monto")]),0);

  const montoQuincena = dashItems.filter(i=>{
    const s = i[fn("inicio")] ? new Date(i[fn("inicio")]) : null;
    return s && s>=now && s<=week2 && getEstado(i)!=="Finalizado";
  }).reduce((s,i)=>s+parseMonto(i[fn("monto")]),0);

  const selSt={background:C.surface,border:"1px solid "+C.border,borderRadius:6,color:C.text,padding:"7px 12px",fontSize:12};

  const KPI=(l,v,sub,col)=>e("div",{style:{background:C.surface,border:"1px solid "+C.border,borderLeft:"3px solid "+(col||C.accent),borderRadius:8,padding:"14px 18px",flex:1,minWidth:110}},
    e("div",{style:{fontSize:10,color:C.dim,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:5}},l),
    e("div",{style:{fontSize:26,fontWeight:800,color:col||C.text,fontFamily:"monospace"}},v),
    sub&&e("div",{style:{fontSize:11,color:C.dim,marginTop:3}},sub)
  );

  function BarChart({data, maxVal, colorFn, valLabel, roundVal}) {
    return e("div",null,
      ...Object.entries(data).sort((a,b)=>b[1]-a[1]).map(([k,v])=>
        e("div",{key:k,style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}},
          e("span",{style:{fontSize:12,minWidth:160,paddingRight:8}},k),
          e("div",{style:{flex:1,display:"flex",alignItems:"center",gap:8}},
            e("div",{style:{flex:1,height:10,background:C.border,borderRadius:5,overflow:"hidden"}},
              e("div",{style:{width:(v/maxVal*100)+"%",height:"100%",background:colorFn(k),borderRadius:5,transition:"width 0.4s"}})
            ),
            e("span",{style:{fontSize:12,color:C.dim,fontFamily:"monospace",minWidth:48,textAlign:"right"}},(roundVal?Math.round(v):v)+(valLabel||""))
          )
        )
      )
    );
  }

  return e("div",{style:{minHeight:"100vh",background:C.bg}},
    // ── HEADER
    e("div",{style:{background:C.surface,borderBottom:"2px solid "+C.accent,padding:"0 20px",display:"flex",alignItems:"center",gap:0}},
      e("div",{style:{padding:"10px 0",marginRight:28,display:"flex",alignItems:"center",gap:12}},
        e(BVLogo),
        e("span",{style:{color:C.dim,fontSize:11,borderLeft:"1px solid "+C.border,paddingLeft:12}})
      ),
      e("div",{style:{display:"flex",flex:1}},
        ...[["dash","📊 Dashboard"],["tareas","📋 Tareas"],["gantt","📅 Planificación"],["insumos","🔧 Insumos"]].map(([id,lbl])=>
          e("button",{key:id,className:"nav-tab"+(tab===id?" active":""),onClick:()=>setTab(id)},lbl)
        )
      ),
      e("div",{style:{display:"flex",alignItems:"center",gap:10}},
        loading&&e("span",{style:{color:C.dim,fontSize:12}},"↻"),
        ok&&e("span",{style:{color:C.success,fontSize:12,fontWeight:700}},ok),
        userName&&e("span",{style:{fontSize:11,color:C.dim}},userName),
        e("button",{onClick:refresh,style:{background:C.surfaceHigh,border:"1px solid "+C.border,color:C.text,padding:"5px 12px",borderRadius:6,cursor:"pointer",fontSize:11}},"↻ Actualizar"),
        e("button",{onClick:logout,style:{background:"none",border:"1px solid "+C.border,color:C.dim,padding:"5px 10px",borderRadius:6,cursor:"pointer",fontSize:11},title:"Cerrar sesión"},"⎋ Salir")
      )
    ),

    e("div",{style:{padding:20}},

      // ── DASHBOARD
      tab==="dash"&&e("div",null,
        // Filtro barco dashboard
        e("div",{style:{display:"flex",justifyContent:"flex-end",marginBottom:16,gap:12,alignItems:"center"}},
          e("span",{style:{fontSize:12,color:C.dim}},"Filtrar por barco:"),
          e("select",{value:fBuque,onChange:ev=>setFBuque(ev.target.value),style:selSt},
            ...buques.map(o=>e("option",{key:o,value:o},o))
          )
        ),
        // KPIs
        e("div",{style:{display:"flex",gap:12,marginBottom:20,flexWrap:"wrap"}},
          KPI("Avance global",pct+"%",nFin+" de "+total+" tareas",C.success),
          KPI("Tareas pendientes",nPen,null,C.dim),
          KPI("Tareas en curso",nEnc,null,C.steel),
          KPI("Tareas finalizadas",nFin,null,C.success),
          KPI("Presupuesto total",fmt(montoTot),"insumos estimados",C.accent),
          KPI("Costos tareas por ejecutar",fmt(montoPend),"tareas no finalizadas",C.warning)
        ),
        // Charts row 1
        e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}},
          // Avance por barco
          e("div",{style:{background:C.surface,border:"1px solid "+C.border,borderRadius:8,padding:20}},
            e("div",{style:{fontSize:12,fontWeight:700,color:C.dim,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:16}},"Avance por barco"),
            byBuque.length===0&&e("div",{style:{color:C.dim}},"Sin datos"),
            ...byBuque.map(b=>e("div",{key:b.b,style:{marginBottom:16}},
              e("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:5}},
                e("span",{style:{fontWeight:700,fontSize:14,color:buqueColor[b.b]||C.text}},b.b),
                e("div",null,
                  e("span",{style:{color:C.dim,fontSize:12}},b.p+"% — "+b.f+"/"+b.t+" "),
                  b.m>0&&e("span",{style:{color:C.accent,fontSize:11,fontFamily:"monospace"}},fmt(b.m))
                )
              ),
              e("div",{style:{background:C.border,borderRadius:4,height:8,overflow:"hidden"}},
                e("div",{style:{width:b.p+"%",height:"100%",background:b.p===100?C.success:b.p>50?C.steel:C.accent,borderRadius:4,transition:"width 0.5s"}})
              )
            ))
          ),
          // Distribución por tipo (cantidad tareas)
          e("div",{style:{background:C.surface,border:"1px solid "+C.border,borderRadius:8,padding:20}},
            e("div",{style:{fontSize:12,fontWeight:700,color:C.dim,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:16}},"Distribución por tipo de tarea (suma de tareas)"),
            e(BarChart,{data:byTipoCnt, maxVal:Math.max(...Object.values(byTipoCnt),1), colorFn:k=>tipoColor[k]||C.steel, valLabel:" tareas"})
          )
        ),
        // Charts row 2: días pendientes + cantidad pendientes
        e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}},
          e("div",{style:{background:C.surface,border:"1px solid "+C.border,borderRadius:8,padding:20}},
            e("div",{style:{fontSize:12,fontWeight:700,color:C.dim,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:16}},"Distribución por tipo de tareas pendientes (días estimados)"),
            Object.keys(byTipoDias).length===0
              ? e("div",{style:{color:C.dim,fontSize:13}},"No hay tareas pendientes con días estimados cargados.")
              : e(BarChart,{data:byTipoDias, maxVal:maxDias, colorFn:k=>tipoColor[k]||C.steel, valLabel:" d", roundVal:true})
          ),
          e("div",{style:{background:C.surface,border:"1px solid "+C.border,borderRadius:8,padding:20}},
            e("div",{style:{fontSize:12,fontWeight:700,color:C.dim,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:16}},"Distribución por tipo de tareas pendientes (cantidad de tareas)"),
            Object.keys(byTipoPendCnt).length===0
              ? e("div",{style:{color:C.dim,fontSize:13}},"No hay tareas pendientes.")
              : e(BarChart,{data:byTipoPendCnt, maxVal:maxPendCnt, colorFn:k=>tipoColor[k]||C.steel, valLabel:" tareas"})
          )
        )
      ),

      // ── TAREAS
      tab==="tareas"&&e("div",null,
        // Filters with labels
        e("div",{style:{display:"flex",gap:12,marginBottom:20,flexWrap:"wrap",alignItems:"flex-end"}},
          e("div",null,
            e("div",{style:{fontSize:10,color:C.dim,textTransform:"uppercase",marginBottom:4,letterSpacing:"0.06em"}},"Buscar"),
            e("input",{placeholder:"🔍 Texto...",value:q,onChange:ev=>setQ(ev.target.value),style:{...selSt,width:180,outline:"none",display:"block"}})
          ),
          e("div",null,
            e("div",{style:{fontSize:10,color:C.dim,textTransform:"uppercase",marginBottom:4,letterSpacing:"0.06em"}},"Barco"),
            e("select",{value:fBuque,onChange:ev=>setFBuque(ev.target.value),style:{...selSt,display:"block"}},...buques.map(o=>e("option",{key:o,value:o},o)))
          ),
          e("div",null,
            e("div",{style:{fontSize:10,color:C.dim,textTransform:"uppercase",marginBottom:4,letterSpacing:"0.06em"}},"Estado"),
            e("select",{value:fEstado,onChange:ev=>setFEstado(ev.target.value),style:{...selSt,display:"block"}},...["Todos",...FIELDS.estado.opts].map(o=>e("option",{key:o,value:o},o)))
          ),
          e("div",null,
            e("div",{style:{fontSize:10,color:C.dim,textTransform:"uppercase",marginBottom:4,letterSpacing:"0.06em"}},"Tipo de tarea"),
            e("select",{value:fTipo,onChange:ev=>setFTipo(ev.target.value),style:{...selSt,display:"block"}},...tipos.map(o=>e("option",{key:o,value:o},o)))
          ),
          e("div",null,
            e("div",{style:{fontSize:10,color:C.dim,textTransform:"uppercase",marginBottom:4,letterSpacing:"0.06em"}},"Sección"),
            e("select",{value:fSeccion,onChange:ev=>setFSeccion(ev.target.value),style:{...selSt,display:"block"}},...secciones.map(o=>e("option",{key:o,value:o},o)))
          ),
          e("div",{style:{flex:1}}),
          e("span",{style:{color:C.dim,fontSize:13,paddingBottom:8}},filtered.length+" tareas"),
          e("button",{onClick:()=>setNewT(true),style:{background:C.accent,border:"none",borderRadius:6,color:"#000",fontWeight:800,padding:"8px 16px",cursor:"pointer",fontSize:13,height:36}},"+ Nueva tarea")
        ),
        e("div",{style:{background:C.surface,border:"1px solid "+C.border,borderRadius:8,overflow:"auto"}},
          e("table",{style:{minWidth:900}},
            e("thead",null,e("tr",{style:{borderBottom:"1px solid "+C.border}},
              ...["Tarea","Barco","Tipo","Sección","Estado","Días Est.","Monto","Inicio","Fin","Acciones"].map(h=>
                e("th",{key:h,style:{padding:"10px 14px",textAlign:"left",fontSize:11,fontWeight:700,color:C.dim,textTransform:"uppercase",letterSpacing:"0.07em",whiteSpace:"nowrap"}},h)
              )
            )),
            e("tbody",null,
              filtered.length===0&&e("tr",null,e("td",{colSpan:10,style:{padding:40,textAlign:"center",color:C.dim}},"No se encontraron tareas.")),
              ...filtered.map((item,idx)=>{
                const est=getEstado(item);
                const tipo=arrFirst(item[fn("tipo")]);
                return e("tr",{key:item._id,style:{borderBottom:"1px solid "+C.border+"22",background:idx%2===0?"transparent":C.surfaceHigh+"44"}},
                  e("td",{style:{padding:"10px 14px",minWidth:260,maxWidth:340}},
                    e("div",{style:{fontWeight:600,fontSize:13}},item.Title),
                    item[fn("comentarios")]&&e("div",{style:{fontSize:11,color:C.dim,marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:300}},item[fn("comentarios")])
                  ),
                  e("td",{style:{padding:"10px 14px"}},e("span",{style:{fontSize:13,fontWeight:700,color:buqueColor[item[fn("buque")]]||C.steel}},item[fn("buque")]||"—")),
                  e("td",{style:{padding:"10px 14px"}},e("span",{style:{background:(tipoColor[tipo]||"#2a2a35")+"33",color:tipoColor[tipo]||C.dim,borderRadius:4,padding:"2px 8px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}},tipo||"—")),
                  e("td",{style:{padding:"10px 14px",fontSize:12,color:C.dim,maxWidth:130,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},item[fn("seccion")]||"—"),
                  e("td",{style:{padding:"10px 14px"}},e("span",{style:{background:statBg[est]||"#2a2a35",color:statColor[est]||C.dim,borderRadius:4,padding:"3px 10px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}},est||"—")),
                  e("td",{style:{padding:"10px 14px",fontSize:12,color:C.dim,fontFamily:"monospace",whiteSpace:"nowrap"}},item[fn("duracion")]?item[fn("duracion")]+"d":"—"),
                  e("td",{style:{padding:"10px 14px",fontSize:12,color:parseMonto(item[fn("monto")])>0?C.accent:C.dim,fontFamily:"monospace",whiteSpace:"nowrap"}},parseMonto(item[fn("monto")])>0?fmt(item[fn("monto")]):"—"),
                  e("td",{style:{padding:"10px 14px",fontSize:11,color:C.dim,whiteSpace:"nowrap"}},fmtDate(item[fn("inicio")])),
                  e("td",{style:{padding:"10px 14px",fontSize:11,color:C.dim,whiteSpace:"nowrap"}},fmtDate(item[fn("fin")])),
                  e("td",{style:{padding:"10px 14px"}},
                    e("div",{style:{display:"flex",gap:5}},
                      e("button",{onClick:()=>setEditT(item),style:{background:C.surfaceHigh,border:"1px solid "+C.border,color:C.text,padding:"4px 9px",borderRadius:4,cursor:"pointer",fontSize:11}},"✏️"),
                      est!=="Finalizado"&&e("button",{onClick:()=>quickStatus(item,est==="Pendiente"?"En curso":"Finalizado"),style:{background:C.steelDim,border:"1px solid "+C.steel,color:C.text,padding:"4px 9px",borderRadius:4,cursor:"pointer",fontSize:11,whiteSpace:"nowrap"}},est==="Pendiente"?"▶":"✓")
                    )
                  )
                );
              })
            )
          )
        )
      ),

      // ── GANTT
      tab==="gantt"&&e("div",{style:{background:C.surface,border:"1px solid "+C.border,borderRadius:8,padding:24}},
        e(GanttView,{tasks:filtered,tok,onUpdateTask:async(itemId,fields)=>{
          await gPatch(tok,BASE+"/items/"+itemId+"/fields",fields);
          await refresh();
        }})
      ),

      // ── INSUMOS
      tab==="insumos"&&e("div",null,
        // KPI row
        e("div",{style:{display:"flex",gap:12,marginBottom:20,flexWrap:"wrap"}},
          KPI("Monto total estimado",fmt(montoTot),"todos los barcos",C.accent),
          KPI("Por adquirir",fmt(montoPend),"tareas no finalizadas",C.warning),
          KPI("Ejecutado",fmt(montoTot-montoPend),"tareas finalizadas",C.success),
          KPI("Por adquirir próxima semana",fmt(montoSemana),"en base a planificación",C.steel),
          KPI("Por adquirir próxima quincena",fmt(montoQuincena),"en base a planificación","#9b59b6")
        ),
        // Charts
        e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}},
          // Insumos por barco — bar chart ejecutado vs pendiente
          e("div",{style:{background:C.surface,border:"1px solid "+C.border,borderRadius:8,padding:20}},
            e("div",{style:{fontSize:12,fontWeight:700,color:C.dim,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:16}},"Insumos por barco"),
            e("div",{style:{display:"flex",gap:16,marginBottom:12,fontSize:11,color:C.dim}},
              e("span",null,e("span",{style:{display:"inline-block",width:10,height:10,background:C.success,borderRadius:2,marginRight:4}}),"Ejecutado"),
              e("span",null,e("span",{style:{display:"inline-block",width:10,height:10,background:C.warning,borderRadius:2,marginRight:4}}),"Por adquirir")
            ),
            ...byBuque.map(b=>{
              const maxM = Math.max(...byBuque.map(x=>x.m),1);
              return e("div",{key:b.b,style:{marginBottom:16}},
                e("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:5}},
                  e("span",{style:{fontWeight:700,color:buqueColor[b.b]||C.steel,fontSize:13}},b.b),
                  e("span",{style:{fontSize:12,color:C.dim}},fmt(b.m))
                ),
                // Stacked bar
                e("div",{style:{height:16,background:C.border,borderRadius:4,overflow:"hidden",display:"flex"}},
                  e("div",{style:{width:(b.mEjec/Math.max(montoTot,1)*100)+"%",background:C.success,transition:"width 0.4s"},title:"Ejecutado: "+fmt(b.mEjec)}),
                  e("div",{style:{width:(b.mPend/Math.max(montoTot,1)*100)+"%",background:C.warning,transition:"width 0.4s"},title:"Por adquirir: "+fmt(b.mPend)})
                ),
                e("div",{style:{display:"flex",justifyContent:"space-between",fontSize:10,color:C.dim,marginTop:3}},
                  e("span","Ejec: "+fmt(b.mEjec)),
                  e("span","Pend: "+fmt(b.mPend))
                )
              );
            })
          ),
          // Top 10 todas
          e("div",{style:{background:C.surface,border:"1px solid "+C.border,borderRadius:8,padding:20}},
            e("div",{style:{fontSize:12,fontWeight:700,color:C.dim,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:16}},"Top 10 tareas por costo"),
            ...[...items].filter(i=>parseMonto(i[fn("monto")])>0).sort((a,b)=>parseMonto(b[fn("monto")])-parseMonto(a[fn("monto")])).slice(0,10).map(i=>
              e("div",{key:i._id,style:{marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},
                e("div",null,
                  e("div",{style:{fontSize:12,fontWeight:600}},i.Title),
                  e("div",{style:{fontSize:10,color:C.dim}},i[fn("buque")]+" — "+arrFirst(i[fn("tipo")])+" — "+getEstado(i))
                ),
                e("div",{style:{fontFamily:"monospace",color:C.accent,fontWeight:700,whiteSpace:"nowrap",marginLeft:10,fontSize:13}},fmt(i[fn("monto")]))
              )
            )
          ),
          // Top 10 pendientes
          e("div",{style:{background:C.surface,border:"1px solid "+C.border,borderRadius:8,padding:20,gridColumn:"1 / -1"}},
            e("div",{style:{fontSize:12,fontWeight:700,color:C.dim,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:16}},"Top 10 tareas pendientes por costo"),
            e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}},
              ...[...items].filter(i=>parseMonto(i[fn("monto")])>0&&getEstado(i)!=="Finalizado").sort((a,b)=>parseMonto(b[fn("monto")])-parseMonto(a[fn("monto")])).slice(0,10).map(i=>
                e("div",{key:i._id,style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"8px 12px",background:C.surfaceHigh,borderRadius:6,border:"1px solid "+C.border}},
                  e("div",null,
                    e("div",{style:{fontSize:12,fontWeight:600}},i.Title),
                    e("div",{style:{fontSize:10,color:C.dim,marginTop:2}},
                      e("span",{style:{color:buqueColor[i[fn("buque")]]||C.steel}},i[fn("buque")]||"")," — ",
                      e("span",{style:{color:statColor[getEstado(i)]||C.dim}},getEstado(i))
                    )
                  ),
                  e("div",{style:{fontFamily:"monospace",color:C.warning,fontWeight:700,whiteSpace:"nowrap",marginLeft:10,fontSize:13}},fmt(i[fn("monto")]))
                )
              )
            )
          )
        )
      )
    ),

    editT&&e(TaskModal,{task:editT,onClose:()=>setEditT(null),onSave:saveTask,onDelete:deleteTask,tok}),
    newT&&e(TaskModal,{task:null,onClose:()=>setNewT(false),onSave:saveTask,isNew:true,tok})
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
</body>
</html>
